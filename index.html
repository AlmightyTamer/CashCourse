<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CashCourse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Landing Section -->
  <section id="landing">
    <h1>CashCourse</h1>
    <p>Learn financial literacy the easy way.</p>
    <button id="signupBtn">Create Account</button>
  </section>

  <!-- Overview Section -->
  <section id="overview">
    <h2>CashCourse Stats</h2>
    <div class="stats">
      <div class="stat"><h3 id="users">0</h3><p>Users</p></div>
      <div class="stat"><h3 id="lessons">0</h3><p>Lessons</p></div>
      <div class="stat"><h3 id="videos">0</h3><p>Videos</p></div>
    </div>
  </section>

  <!-- Main Course Page (hidden until login) -->
  <section id="coursePage" class="hidden">
    <h2>Main Courses</h2>
    <div id="chapters"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
